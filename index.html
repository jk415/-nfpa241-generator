<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<title>NFPA 241 Plan Generator — CAP Design Group</title>

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#f1f5f9;min-height:100vh}
  .header{background:#1e293b;border-bottom:4px solid #dc2626;padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
  .header-left .sub{font-size:10px;font-weight:700;letter-spacing:.12em;color:#94a3b8;text-transform:uppercase}
  .header-left .title{font-size:20px;font-weight:800;color:#fff;margin-top:2px}
  .header-right{font-size:12px;color:#64748b}
  .progress-bar{height:4px;background:#e2e8f0}
  .progress-fill{height:4px;background:#dc2626;transition:width .3s}
  .step-nav{background:#fff;border-bottom:1px solid #e2e8f0;display:flex;overflow-x:auto}
  .step-btn{padding:13px 14px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:500;color:#94a3b8;border-bottom:3px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:5px;font-family:inherit}
  .step-btn.active{color:#dc2626;border-bottom-color:#dc2626;font-weight:700}
  .step-btn.done{color:#16a34a}
  .content{max-width:940px;margin:0 auto;padding:28px}
  .step-header{margin-bottom:18px}
  .step-header h2{font-size:20px;font-weight:800;color:#1e293b;margin-bottom:4px}
  .step-header p{color:#475569;font-size:13px}
  .card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:24px 28px;margin-bottom:20px}
  .card-title{font-size:11px;font-weight:700;color:#dc2626;text-transform:uppercase;letter-spacing:.1em;border-bottom:2px solid #fee2e2;padding-bottom:10px;margin-bottom:18px}
  .field{margin-bottom:15px}
  .field label{display:block;font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:#64748b;margin-bottom:5px}
  .field .hint{font-size:11px;color:#94a3b8;margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;padding:10px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;color:#1e293b;background:#fff;outline:none;font-family:inherit}
  .field textarea{resize:vertical}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:#dc2626}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .toggle-wrap{display:flex;align-items:flex-start;gap:12px;margin-bottom:15px}
  .toggle{width:44px;height:24px;border-radius:12px;background:#e2e8f0;cursor:pointer;position:relative;flex-shrink:0;margin-top:2px;transition:background .2s}
  .toggle.on{background:#dc2626}
  .toggle-dot{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .toggle.on .toggle-dot{left:23px}
  .toggle-label{font-size:14px;font-weight:600;color:#1e293b}
  .toggle-hint{font-size:12px;color:#94a3b8;margin-top:2px}
  .contact-row{display:grid;grid-template-columns:1fr 1fr 1fr 32px;gap:8px;margin-bottom:8px}
  .contact-row input{padding:8px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px;font-family:inherit;outline:none}
  .contact-row input:focus{border-color:#dc2626}
  .btn-remove{background:#fee2e2;border:none;border-radius:6px;cursor:pointer;color:#dc2626;font-size:16px;display:flex;align-items:center;justify-content:center}
  .btn-add{margin-top:8px;padding:8px 16px;background:#fee2e2;color:#dc2626;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
  .nav-btns{display:flex;justify-content:space-between;margin-top:24px}
  .btn-prev{padding:12px 24px;background:#fff;color:#1e293b;border:1px solid #e2e8f0;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit}
  .btn-prev:disabled{opacity:.4;cursor:default}
  .btn-next{padding:12px 28px;background:#dc2626;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;font-family:inherit}
  .btn-generate{padding:16px 44px;background:#16a34a;color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:17px;font-weight:800;font-family:inherit;display:block;margin:0 auto}
  .btn-generate:disabled{background:#94a3b8;cursor:not-allowed}
  .info-box{background:#f0fdf4;border:1px solid #86efac;border-radius:10px;padding:20px;margin-bottom:20px}
  .info-box h3{font-size:15px;font-weight:700;color:#166534;margin-bottom:12px}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;color:#166534}
  .info-grid span{font-weight:700}
  .blue-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:14px;margin-bottom:24px;font-size:13px;color:#1d4ed8}
  .yellow-box{background:#fef3c7;border:1px solid #fcd34d;border-radius:8px;padding:14px;margin-bottom:16px;font-size:13px;color:#92400e}
  .green-box{background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:14px;font-size:13px;color:#166534;line-height:1.8}
  .error-msg{color:#dc2626;margin-top:14px;font-size:13px;text-align:center}
  .contact-header{display:grid;grid-template-columns:1fr 1fr 1fr 32px;gap:8px;margin-bottom:6px;font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase}
  .map-frame{border:2px solid #e2e8f0;border-radius:10px;overflow:hidden;height:280px;margin-bottom:6px}
  .map-frame iframe{border:0;width:100%;height:100%}
  .map-label{font-size:13px;font-weight:700;color:#dc2626;margin-bottom:8px;margin-top:16px}
  .map-hint{font-size:11px;color:#94a3b8;margin-top:4px}
  .no-address{background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:16px;text-align:center;color:#c2410c}
  .toc-line{font-size:13px;padding:3px 0;color:#475569}
  .toc-line.main{font-weight:700;color:#1e293b}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="sub">CAP Design Group</div>
    <div class="title">NFPA 241 Plan Generator</div>
  </div>
  <div class="header-right">Jason Kahan P.E. No. 48388 &nbsp;|&nbsp; MA Fire Protection</div>
</div>

<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

<div class="step-nav" id="stepNav"><button class="step-btn active " onclick="goStep(0)">
      🏗️ Project Info
    </button><button class="step-btn  " onclick="goStep(1)">
      🏢 Building
    </button><button class="step-btn  " onclick="goStep(2)">
      👥 Contacts
    </button><button class="step-btn  " onclick="goStep(3)">
      🚒 Fire Dept / AHJ
    </button><button class="step-btn  " onclick="goStep(4)">
      🔥 Systems &amp; Hazards
    </button><button class="step-btn  " onclick="goStep(5)">
      🏠 Occupied Building
    </button><button class="step-btn  " onclick="goStep(6)">
      🗺️ Maps Preview
    </button><button class="step-btn  " onclick="goStep(7)">
      📄 Generate .docx
    </button></div>

<div class="content">
  <div class="step-header">
    <h2 id="stepTitle">🏗️ Project Info</h2>
    <p id="stepSub">Step 1 of 8</p>
  </div>
  <div id="stepContent"><div class="card"><div class="card-title">Project Information</div><div class="field"><label>Project Address *</label><input type="text" value="" placeholder="69 Campbell Ave, Revere, MA 02151" oninput="data[&#39;projectAddress&#39;]=this.value"></div><div class="row2"><div class="field"><label>City / Municipality</label><select onchange="cityChanged(this.value)"><option value="Boston">Boston</option><option value="Revere" selected="">Revere</option><option value="Cambridge">Cambridge</option><option value="Somerville">Somerville</option><option value="Lynn">Lynn</option><option value="Quincy">Quincy</option><option value="Everett">Everett</option><option value="Medford">Medford</option><option value="Malden">Malden</option><option value="Waltham">Waltham</option><option value="Other">Other</option></select></div><div class="field"><label>Plan Date</label><input type="date" value="2026-03-06" placeholder="" oninput="data[&#39;planDate&#39;]=this.value"></div></div><div class="field"><label>Revision</label><input type="text" value="Rev. 0 — Initial Submission" placeholder="Rev. 0 — Initial Submission" oninput="data[&#39;revision&#39;]=this.value"></div><div class="field"><label>Scope of Work</label><textarea rows="2" placeholder="e.g. Installation of new fire sprinkler system and fire alarm system within the existing building" oninput="data[&#39;scopeOfWork&#39;]=this.value"></textarea></div></div></div>
  <div class="nav-btns">
    <button class="btn-prev" id="btnPrev" onclick="prevStep()" disabled="">← Previous</button>
    <button class="btn-next" id="btnNext" onclick="nextStep()">Next Step →</button>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────
const MA_CITIES = {
  "Boston":    {fd:"Boston Fire Department",    addr:"1010 Massachusetts Avenue, Boston, MA 02118"},
  "Revere":    {fd:"Revere Fire Department",     addr:"400 Broadway, Revere, MA 02151"},
  "Cambridge": {fd:"Cambridge Fire Department",  addr:"491 Broadway, Cambridge, MA 02138"},
  "Somerville":{fd:"Somerville Fire Department", addr:"259 Elm Street, Somerville, MA 02144"},
  "Lynn":      {fd:"Lynn Fire Department",       addr:"135 Market Street, Lynn, MA 01901"},
  "Quincy":    {fd:"Quincy Fire Department",     addr:"100 Coddington Street, Quincy, MA 02169"},
  "Everett":   {fd:"Everett Fire Department",    addr:"210 Broadway, Everett, MA 02149"},
  "Medford":   {fd:"Medford Fire Department",    addr:"100 Main Street, Medford, MA 02155"},
  "Malden":    {fd:"Malden Fire Department",     addr:"200 Pleasant Street, Malden, MA 02148"},
  "Waltham":   {fd:"Waltham Fire Department",    addr:"785 Main Street, Waltham, MA 02451"},
  "Other":     {fd:"",addr:""}
};

let data = {
  projectAddress:"", city:"Revere",
  planDate: new Date().toISOString().split("T")[0],
  revision:"Rev. 0 — Initial Submission",
  buildingUse:"", useGroup:"R-2", constructionType:"Type V-B",
  buildingHeight:"", storiesAbove:"3", storiesBelow:"1", occupantLoad:"",
  hazardousMaterials:"None", scopeOfWork:"", buildingSummary:"",
  contacts:[{name:"", role:"Fire Prevention Manager (FPPM)", phone:""}],
  fdName:"", fdAddress:"", ahjName:"",
  accessStreet:"", firelanesExisting:true, knoxBoxLocation:"Main entrance",
  musterPointA:"Sidewalk in front of building, across the street",
  musterPointB:"Rear of property / parking area",
  nearestFireStation:"", responseTime:"", nearestHydrant:"",
  hasExistingAlarm:false, existingAlarmDesc:"",
  hasExistingSprinkler:false, existingSprinklerDesc:"",
  existingSystems:"During construction the building shall employ fire extinguishers throughout per PIP plans.",
  isOccupied:false, occupiedOperationNarrative:"", phaseDescription:"",
  specialCircumstances:""
};

let currentStep = 0;
const STEPS = [
  {label:"Project Info",      icon:"🏗️"},
  {label:"Building",          icon:"🏢"},
  {label:"Contacts",          icon:"👥"},
  {label:"Fire Dept / AHJ",   icon:"🚒"},
  {label:"Systems & Hazards", icon:"🔥"},
  {label:"Occupied Building",  icon:"🏠"},
  {label:"Maps Preview",      icon:"🗺️"},
  {label:"Generate .docx",    icon:"📄"},
];

// ── Helpers ──────────────────────────────────────────────────────────
function field(label, name, value, type="text", placeholder="", hint="") {
  const h = hint ? `<div class="hint">${hint}</div>` : "";
  return `<div class="field"><label>${label}</label>${h}<input type="${type}" value="${esc(value)}" placeholder="${esc(placeholder)}" oninput="data['${name}']=this.value" /></div>`;
}
function select(label, name, value, options) {
  const opts = options.map(o=>`<option value="${o}" ${o===value?"selected":""}>${o}</option>`).join("");
  return `<div class="field"><label>${label}</label><select onchange="data['${name}']=this.value;renderStep()">${opts}</select></div>`;
}
function selectCity(label, name, value) {
  const opts = Object.keys(MA_CITIES).map(o=>`<option value="${o}" ${o===value?"selected":""}>${o}</option>`).join("");
  return `<div class="field"><label>${label}</label><select onchange="cityChanged(this.value)">${opts}</select></div>`;
}
function textarea(label, name, value, rows=3, hint="", placeholder="") {
  const h = hint ? `<div class="hint">${hint}</div>` : "";
  return `<div class="field"><label>${label}</label>${h}<textarea rows="${rows}" placeholder="${esc(placeholder)}" oninput="data['${name}']=this.value">${esc(value)}</textarea></div>`;
}
function toggle(label, name, value, hint="") {
  const h = hint ? `<div class="toggle-hint">${hint}</div>` : "";
  return `<div class="toggle-wrap">
    <div class="toggle ${value?"on":""}" id="tog_${name}" onclick="toggleField('${name}')"><div class="toggle-dot"></div></div>
    <div><div class="toggle-label">${label}</div>${h}</div>
  </div>`;
}
function toggleField(name) {
  data[name] = !data[name];
  renderStep();
}
function cityChanged(val) {
  data.city = val;
  const ci = MA_CITIES[val];
  if (ci) { data.fdName = ci.fd; data.fdAddress = ci.addr; }
  renderStep();
}
function esc(str) {
  return String(str||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function r2(children) { return `<div class="row2">${children}</div>`; }
function card(title, html) { return `<div class="card"><div class="card-title">${title}</div>${html}</div>`; }

// ── Contacts ──────────────────────────────────────────────────────────
function renderContacts() {
  let rows = `<div class="contact-header"><div>Name</div><div>Role</div><div>Phone</div><div></div></div>`;
  data.contacts.forEach((c,i) => {
    rows += `<div class="contact-row">
      <input value="${esc(c.name)}" placeholder="Name" oninput="data.contacts[${i}].name=this.value"/>
      <input value="${esc(c.role)}" placeholder="Role" oninput="data.contacts[${i}].role=this.value"/>
      <input value="${esc(c.phone)}" placeholder="Phone" oninput="data.contacts[${i}].phone=this.value"/>
      <button class="btn-remove" onclick="removeContact(${i})">×</button>
    </div>`;
  });
  return rows + `<button class="btn-add" onclick="addContact()">+ Add Contact</button>`;
}
function addContact() { data.contacts.push({name:"",role:"",phone:""}); renderStep(); }
function removeContact(i) { data.contacts.splice(i,1); renderStep(); }

// ── Step renderer ─────────────────────────────────────────────────────
function getStepHTML() {
  switch(currentStep) {
    case 0: return card("Project Information",
      field("Project Address *","projectAddress",data.projectAddress,"text","69 Campbell Ave, Revere, MA 02151") +
      r2(selectCity("City / Municipality","city",data.city) + field("Plan Date","planDate",data.planDate,"date")) +
      field("Revision","revision",data.revision,"text","Rev. 0 — Initial Submission") +
      textarea("Scope of Work","scopeOfWork",data.scopeOfWork,2,"","e.g. Installation of new fire sprinkler system and fire alarm system within the existing building")
    );
    case 1: return (
      card("Building Description",
        r2(select("Use Group","useGroup",data.useGroup,["R-1","R-2","R-3","A-1","A-2","B","E","I-1","I-2","M","S-1","S-2","U"]) +
           field("Building Use","buildingUse",data.buildingUse,"text","e.g. Boarding/Lodging House")) +
        r2(select("Construction Type","constructionType",data.constructionType,["Type I-A","Type I-B","Type II-A","Type II-B","Type III-A","Type III-B","Type IV-A","Type IV-B","Type IV-C","Type V-A","Type V-B"]) +
           field("Building Height","buildingHeight",data.buildingHeight,"text","35'-0\"")) +
        r2(field("Stories Above Grade","storiesAbove",data.storiesAbove,"number") +
           field("Stories Below Grade","storiesBelow",data.storiesBelow,"number")) +
        r2(field("Occupant Load (Est.)","occupantLoad",data.occupantLoad,"text","e.g. 6 residents") +
           field("Hazardous Materials","hazardousMaterials",data.hazardousMaterials,"text","None")) +
        textarea("Custom Building Summary","buildingSummary",data.buildingSummary,3,"Leave blank to auto-generate from fields above.","Leave blank to auto-generate...")
      ) +
      card("Existing Life Safety Systems",
        toggle("Existing Fire Alarm System","hasExistingAlarm",data.hasExistingAlarm) +
        (data.hasExistingAlarm ? field("Describe Existing Alarm","existingAlarmDesc",data.existingAlarmDesc,"text","e.g. Partial conventional, 1 smoke/floor") : "") +
        toggle("Existing Sprinkler System","hasExistingSprinkler",data.hasExistingSprinkler) +
        (data.hasExistingSprinkler ? field("Describe Existing Sprinkler","existingSprinklerDesc",data.existingSprinklerDesc,"text","e.g. NFPA 13D partial wet") : "") +
        textarea("Systems Summary","existingSystems",data.existingSystems,2)
      )
    );
    case 2: return card("Project Contacts & Stakeholders",
      `<p style="font-size:12px;color:#64748b;margin-bottom:14px">The contact with "FPPM" or "Fire Prevention" in their role will be used as the Fire Protection Program Manager throughout the plan.</p>` +
      renderContacts()
    );
    case 3: return (
      card("Fire Department",
        field("Fire Department Name","fdName",data.fdName||MA_CITIES[data.city]?.fd||"","text",MA_CITIES[data.city]?.fd||"","Auto-populated from city — edit if needed") +
        field("Fire Department Address","fdAddress",data.fdAddress||MA_CITIES[data.city]?.addr||"","text",MA_CITIES[data.city]?.addr||"") +
        r2(field("Nearest Fire Station","nearestFireStation",data.nearestFireStation,"text","Station 1 — 400 Broadway (0.8 mi)") +
           field("Estimated Response Time","responseTime",data.responseTime,"text","6–7 minutes")) +
        field("AHJ Name","ahjName",data.ahjName,"text",`City of ${data.city} Inspectional Services Department`,"Leave blank to auto-generate")
      ) +
      card("Site Access & Emergency Response",
        field("Primary Access Street *","accessStreet",data.accessStreet,"text","e.g. Campbell Ave.") +
        toggle("Fire Lanes Are Existing","firelanesExisting",data.firelanesExisting,"Toggle off if fire lanes need to be established") +
        field("Knox Box Location","knoxBoxLocation",data.knoxBoxLocation,"text","Main entrance — front door") +
        field("Nearest Fire Hydrant","nearestHydrant",data.nearestHydrant,"text","e.g. SW corner of Campbell Ave. and N. Shore Rd.") +
        field("Muster Point A (Primary)","musterPointA",data.musterPointA,"text","Sidewalk in front of building, across the street") +
        field("Muster Point B (Secondary)","musterPointB",data.musterPointB,"text","Rear parking area")
      )
    );
    case 4: return card("Systems & Special Hazards",
      textarea("Existing Systems Narrative","existingSystems",data.existingSystems,3) +
      textarea("Special Circumstances (Section 3.5)","specialCircumstances",data.specialCircumstances,4,"Leave blank if none — standard language will be used.","e.g. unique access constraints, site-specific hazards...")
    );
    case 5: return card("Occupied Building Settings",
      toggle("Building Remains Occupied During Construction","isOccupied",data.isOccupied,"Enables Section 5.3 (Phased Installation Plan) and full Annex F (527 CMR 10.9 Emergency Plan Coordination with fire watch procedures)") +
      (data.isOccupied ? `
        <div class="yellow-box"><strong>Occupied mode ON.</strong> Section 5.3 and Annex F (F.1–F.9) including fire watch requirements and 527 CMR 10.9 coordination will be included in your .docx file.</div>
        ${textarea("Phased Construction Description (optional)","phaseDescription",data.phaseDescription,4,"Leave blank for standard phased language.","e.g. Phase 1 — Basement (riser, FACP). Phase 2 — 1st Floor (relocate unit 1)...")}
        ${textarea("Occupied Operation Narrative — Annex F.8 (optional)","occupiedOperationNarrative",data.occupiedOperationNarrative,4,"Leave blank for standard boilerplate.","Describe how the property continues to operate during construction.")}
      ` : "")
    );
    case 6:
      const addr = data.projectAddress;
      const mapsHTML = addr ? `
        <div class="map-label">📍 Locus Map — Annex A</div>
        <div class="map-frame"><iframe src="https://maps.google.com/maps?q=${encodeURIComponent(addr)}&output=embed&z=15" allowfullscreen></iframe></div>
        <div class="map-hint">Screenshot this for Annex A — Building Overview</div>
        <div class="map-label">🚒 Nearest Fire Stations — Annex A</div>
        <div class="map-frame"><iframe src="https://maps.google.com/maps?q=fire+station+near+${encodeURIComponent(addr)}&output=embed&z=13" allowfullscreen></iframe></div>
        <div class="map-hint">Note distances and response times. Screenshot for Annex A.</div>
        <div class="map-label">💧 Fire Hydrant Locations — Annex B</div>
        <div class="map-frame"><iframe src="https://maps.google.com/maps?q=fire+hydrant+near+${encodeURIComponent(addr)}&output=embed&z=15" allowfullscreen></iframe></div>
        <div class="map-hint">Screenshot and annotate with red arrows for Annex B.</div>
        <div class="green-box" style="margin-top:16px"><strong>Tip:</strong> Right-click any map → "Open image in new tab" or open in Google Maps for a full-screen view to screenshot.</div>
      ` : `<div class="no-address">Enter a project address in Step 1 to generate maps.</div>`;
      return card("Maps Preview — For Annexes A &amp; B",
        `<p style="font-size:13px;color:#475569;margin-bottom:16px">The generated .docx will contain placeholder notes for each map. Use these live previews to take screenshots for the final document.</p>` + mapsHTML
      );
    case 7:
      const ci = MA_CITIES[data.city]||{fd:"",addr:""};
      const fd2 = data.fdName||ci.fd||data.city+" Fire Department";
      const fppm2 = data.contacts.find(c=>/fppm|fire prev/i.test(c.role))||data.contacts[0]||{};
      return `
        <div class="card">
          <div class="card-title">Generate Formatted .docx File</div>
          <div class="info-box">
            <h3>✅ Ready to generate</h3>
            <div class="info-grid">
              <div><span>Project:</span> ${esc(data.projectAddress)||"(not set)"}</div>
              <div><span>City / FD:</span> ${esc(fd2)}</div>
              <div><span>Building:</span> ${esc(data.useGroup)} — ${esc(data.constructionType)}</div>
              <div><span>FPPM:</span> ${esc(fppm2.name)||"(not set)"}</div>
              <div><span>Occupied Building:</span> ${data.isOccupied?"YES — Annex F included":"No"}</div>
              <div><span>Contacts:</span> ${data.contacts.length} stakeholder(s)</div>
            </div>
          </div>
          <div class="blue-box"><strong>Your .docx includes:</strong> Branded cover page · Contact &amp; stakeholder table · Full table of contents · All 5 sections with your data pre-filled · NFPA 241 Table 4.2.1 · Annexes A–E with formatted checklists${data.isOccupied?" · Full Annex F (F.1–F.9) with fire watch procedures":""} · Running header/footer · Signature &amp; certification page</div>
          <div style="text-align:center">
            <button class="btn-generate" id="btnGenerate" onclick="generateDocx()">⬇️ Download NFPA 241 Plan (.docx)</button>
            <p class="error-msg" id="errorMsg" style="display:none"></p>
            <div class="green-box" id="successBox" style="display:none;margin-top:18px;text-align:left">
              <strong>Next Steps in Word:</strong><br>
              1. Insert map screenshots into Annex A and B placeholder pages<br>
              2. Drop in your PE seal image on the cover page<br>
              3. Use Ctrl+F and search for <strong>[</strong> to find any remaining bracket placeholders<br>
              4. Save as PDF and submit to AHJ
            </div>

// ── Navigation ────────────────────────────────────────────────────────
function renderNav() {
  const nav = document.getElementById("stepNav");
  nav.innerHTML = STEPS.map((s,i)=>
    `<button class="step-btn ${i===currentStep?"active":""} ${i<currentStep?"done":""}" onclick="goStep(${i})">
      ${i<currentStep?"✓":s.icon} ${s.label}
    </button>`
  ).join("");
  document.getElementById("progressFill").style.width = (currentStep/(STEPS.length-1)*100)+"%";
  document.getElementById("btnPrev").disabled = currentStep===0;
  const btnNext = document.getElementById("btnNext");
  if (currentStep === STEPS.length-1) { btnNext.style.display="none"; } else { btnNext.style.display=""; }
}

function renderStep() {
  document.getElementById("stepTitle").textContent = STEPS[currentStep].icon + " " + STEPS[currentStep].label;
  document.getElementById("stepSub").textContent = `Step ${currentStep+1} of ${STEPS.length}`;
  document.getElementById("stepContent").innerHTML = getStepHTML();
  renderNav();
}

function goStep(i) { currentStep=i; renderStep(); window.scrollTo(0,0); }
function nextStep() { if(currentStep<STEPS.length-1){currentStep++;renderStep();window.scrollTo(0,0);} }
function prevStep() { if(currentStep>0){currentStep--;renderStep();window.scrollTo(0,0);} }

// ── DOCX Generation ───────────────────────────────────────────────────
async function generateDocx() {
  const btn = document.getElementById("btnGenerate");
  const err = document.getElementById("errorMsg");
  const suc = document.getElementById("successBox");
  btn.disabled=true; btn.textContent="⏳ Building document...";
  err.style.display="none"; suc.style.display="none";

  try {
    if (!window.docx) throw new Error("docx library not loaded. Check your internet connection and refresh.");
    const blob = await buildDocxBlob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    const safe = (data.projectAddress||"Plan").replace(/[^a-zA-Z0-9]/g,"_").replace(/_+/g,"_");
    a.href=url; a.download=`NFPA241_${safe}_${data.planDate||"Draft"}.docx`; a.click();
    URL.revokeObjectURL(url);
    btn.textContent="✅ Downloaded! Generate Again?";
    btn.disabled=false;
    suc.style.display="block";
  } catch(e) {
    console.error(e);
    err.textContent="Error: "+e.message;
    err.style.display="block";
    btn.textContent="⬇️ Download NFPA 241 Plan (.docx)";
    btn.disabled=false;
  }
}
